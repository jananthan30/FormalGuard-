# FormalGuard — PCI-DSS v4.0 Compliance Mapping
# ================================================
# Maps FormalGuard formal verification properties to PCI-DSS v4.0
# requirements for cryptographic hardware security.
#
# Scope: Hardware-level controls in Requirements 3, 4, and 8 that
# relate to cryptographic key management, data protection, and
# access control in HSMs and crypto modules.

standard: PCI-DSS
version: "4.0"
last_updated: "2026-03-30"

mappings:
  - requirement_id: "3.5.1"
    requirement_text: >
      Cryptographic keys used to protect stored account data are secured
      against disclosure and misuse
    properties:
      - FG_AES_FUNC_001
      - FG_AES_FUNC_002
      - FG_AES_TIME_001
      - FG_AES_TIME_002
      - FG_HSM_KEY_002
      - FG_RSA_FUNC_001
      - FG_RSA_TIME_001
      - FG_SHA_FUNC_002
      - FG_SC_CT_001
    verification_status: null
    notes: >
      Covers both functional correctness of cryptographic operations and
      resistance to timing side-channel attacks that could leak key material.

  - requirement_id: "3.5.2"
    requirement_text: >
      Cryptographic operations require prior authentication
    properties:
      - FG_HSM_AUTH_001
    verification_status: null
    notes: >
      Verifies that no cryptographic operation can execute on the HSM
      without a preceding successful authentication event.

  - requirement_id: "3.6.1"
    requirement_text: >
      Strong cryptography key management processes and procedures are
      defined and implemented, including generation of strong keys
    properties:
      - FG_AES_FUNC_004
      - FG_RSA_FUNC_002
      - FG_HSM_KEY_001
    verification_status: null
    notes: >
      Enforces minimum key length requirements and entropy standards
      for key generation in hardware.

  - requirement_id: "3.6.4"
    requirement_text: >
      Cryptographic key changes for keys that have reached the end of
      their cryptoperiod are performed
    properties:
      - FG_HSM_KEY_004
    verification_status: null
    notes: >
      Verifies atomic key rotation: old key becomes invalid only after
      new key is confirmed active, preventing service disruption.

  - requirement_id: "3.6.5"
    requirement_text: >
      Retirement or replacement of keys is performed when the integrity
      of the key has been weakened or keys are suspected of being compromised
    properties:
      - FG_HSM_KEY_003
      - FG_HSM_KEY_005
    verification_status: null
    notes: >
      Verifies complete key destruction (zeroization): all copies
      overwritten within bounded time, no remnants in RAM.

  - requirement_id: "3.6.6"
    requirement_text: >
      Split knowledge and dual control of cryptographic keys are used
      for manual clear-text key management operations
    properties:
      - FG_HSM_AUTH_002
    verification_status: null
    notes: >
      Verifies dual-control enforcement: critical operations (key export,
      firmware update) require two independent authentications.

  - requirement_id: "3.4"
    requirement_text: >
      Access to displays of full PAN and ability to copy cardholder data
      are restricted
    properties:
      - FG_TX_ISOL_001
    verification_status: null
    notes: >
      At the hardware level, this maps to transaction isolation —
      preventing data leakage between pipeline transactions.

  - requirement_id: "8.1.6"
    requirement_text: >
      Access is limited based on failed authentication attempts
    properties:
      - FG_HSM_AUTH_003
    verification_status: null
    notes: >
      Verifies that the HSM locks out after N consecutive failed
      authentication attempts.
