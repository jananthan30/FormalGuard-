# FormalGuard — ISO 27001:2022 Compliance Mapping
# ==================================================
# Maps FormalGuard properties to ISO 27001:2022 Annex A controls
# related to cryptographic hardware security.

standard: ISO 27001
version: "2022"
last_updated: "2026-03-30"

mappings:
  - requirement_id: "A.8.24"
    requirement_text: >
      Use of cryptography — rules for effective use of cryptography
      including key management shall be defined and implemented
    properties:
      - FG_AES_FUNC_001
      - FG_AES_FUNC_002
      - FG_AES_FUNC_004
      - FG_RSA_FUNC_001
      - FG_RSA_FUNC_002
      - FG_SHA_FUNC_001
      - FG_SHA_FUNC_002
      - FG_ECDSA_FUNC_001
      - FG_HSM_KEY_001
      - FG_HSM_KEY_002
      - FG_HSM_KEY_003
      - FG_HSM_KEY_004
      - FG_HSM_KEY_005
    verification_status: null
    notes: >
      Comprehensive coverage of cryptographic correctness and key
      lifecycle management at the hardware level.

  - requirement_id: "A.8.5"
    requirement_text: >
      Secure authentication — authentication mechanisms shall be
      designed and implemented to ensure adequate security
    properties:
      - FG_HSM_AUTH_001
      - FG_HSM_AUTH_002
      - FG_HSM_AUTH_003
    verification_status: null
    notes: >
      Hardware-enforced authentication, dual control, and lockout.

  - requirement_id: "A.7.12"
    requirement_text: >
      Cabling security — power and telecommunications cabling
      carrying data shall be protected from interception and damage
    properties:
      - FG_SC_CT_001
      - FG_SC_CT_002
      - FG_SC_PWR_001
      - FG_SC_DIF_001
    verification_status: null
    notes: >
      Side-channel resistance properties ensure that hardware does not
      leak secret data through timing, power, or EM emanations.

  - requirement_id: "A.7.13"
    requirement_text: >
      Equipment maintenance — equipment shall be maintained to ensure
      availability and integrity of information
    properties:
      - FG_HSM_TAMP_001
      - FG_HSM_TAMP_002
      - FG_HSM_TAMP_003
    verification_status: null
    notes: >
      Tamper detection and response ensures physical security events
      trigger immediate key destruction.

  - requirement_id: "A.8.10"
    requirement_text: >
      Information deletion — information stored in systems shall be
      deleted when no longer required
    properties:
      - FG_HSM_KEY_003
      - FG_HSM_KEY_005
    verification_status: null
    notes: >
      Complete key zeroization with no remnants, verified formally.

  - requirement_id: "A.8.26"
    requirement_text: >
      Application security requirements — information security
      requirements shall be identified and specified when developing
      or acquiring applications
    properties:
      - FG_TX_ATOM_001
      - FG_TX_ISOL_001
      - FG_TX_INTEG_001
      - FG_TX_ORDER_001
    verification_status: null
    notes: >
      Transaction processing security properties ensuring atomicity,
      isolation, integrity, and ordering at the hardware level.
